spring.application.name=sgo
server.port=8080
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sgo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
jwt.secret=${JWT_SECRET:sgo-secret-key-2024-change-in-production-min-256-bits}
jwt.expiration=86400000
spring.jackson.serialization.write-dates-as-timestamps=false
