<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGO - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-card">
        
        <div class="login-logo">🔧</div>
        <h1 class="login-title">SGO Oficina</h1>
        <p class="login-subtitle">Gestão Integrada de Serviços</p>
        
        <form action="dashboard.html">
            
            <div class="login-input-group">
                <label>Nome de Utilizador</label>
                <input type="text" placeholder="ex: gerente" required>
            </div>
            
            <div class="login-input-group">
                <label>Palavra-Passe</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">
                Entrar na Plataforma ➝
            </button>

        </form>
        
        <a href="#" class="forgot-password">Esqueceu-se da password?</a>
        
        <p style="margin-top: 40px; font-size: 11px; color: #dfe6e9; text-transform: uppercase; letter-spacing: 1px;">
            Grupo T04 • Universidade Lusófona
        </p>
    </div>

</body>
</html>
